<!DOCTYPE html>
<html>

<head>
    <title>Experimento CookieJar</title>
    <meta charset="UTF-8">

    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function@2.0.0"></script>

    <link href= "https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/gh/jspsych/jspsych@jspsych@7.0.0/examples/js/webgazer/webgazer.js"></script>
    <script src="https://unpkg.com/@jspsych/extension-webgazer@1.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-webgazer-init-camera@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-webgazer-calibrate@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-webgazer-validate@2.0.0"></script>

    <script src="runtime.js"></script>
    <script src="recorder.js"></script>
</head>

<body>
    <style>
        /* Estilo general de la página */
        body {
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        /* Contenedores generales */
        .wrapper-experimento {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            max-width: 750px;
            margin: 0 auto !important;
            padding: 20px;
        }
        .wrapper-experimento.wide {
            max-width: 850px;
        }

        /* Tarjeta Blanca */
        .card-experimento {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            padding: 45px 40px;
            text-align: center;
        }

        /* Caja Gris */
        .section-box {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 30px 25px;
            margin-bottom: 20px;
        }

        /* Texto */
        .eyebrow {
            display: block;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748b;
        }

        .title {
            margin: 0 0 15px 0;
            font-size: 1.9rem;
            font-weight: 800;
            color: #1e293b;
        }

        .subtitle {
            margin: 0 0 30px 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: #475569;
        }
        
        /* Listas */
        .checklist {
            margin: 0;
            padding: 0;
        }

        .checklist li {
            position: relative;
            list-style: none;
            padding-left: 35px;
            margin-bottom: 18px;
            text-align: left;
            font-size: 1.1rem;
            color: #334155;
        }

        .checklist li:last-child {
            margin-bottom: 0;
        }

        .checklist li::before {
            content: "✓";
            position: absolute;
            left: 0;
            top: 2px;
            color: #2563eb;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        /* Timer */
        .timer-pill {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 9999px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #334155;
            font-size: 1.1rem;
            font-weight: 700;
            visibility: hidden;
        }

         /* Loader Imagenes */
        .loader-text {
            color: #64748b;
            font-weight: 600;
        }

        /* Contenedor de estimulos */
        .stimulus-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            padding: 15px;
            margin-bottom: 30px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        /* Imagen de estimulo */
        .stimulus-image {
            max-width: 100%;
            max-height: 450px;
            height: auto;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Botones */
        .jspsych-btn, #btn-enviar-custom {
            background-color: #2563eb !important;
            color: #ffffff !important;
            border: none !important;
            padding: 12px 35px !important;
            font-size: 1rem !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            transition: background-color 0.2s, transform 0.1s !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2) !important;
        }
        .jspsych-btn:hover, #btn-enviar-custom:hover {
            background-color: #1d4ed8 !important;
        }
        .jspsych-btn:active, #btn-enviar-custom:active {
            transform: scale(0.98);
        }
        .jspsych-btn:disabled, #btn-enviar-custom:disabled {
            background-color: #64748b !important;
            opacity: 0.5 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }

        /* --- ESTILOS DE EVALUACIÓN EMOCIONAL (OASIS) --- */
        .o-con { font-family: 'Segoe UI', -apple-system, sans-serif; max-width: 850px; margin: 0 auto; text-align: center; padding: 10px; }
        .o-title { color: #1e293b; margin-bottom: 35px; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        .o-card { background: #ffffff; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; margin-bottom: 40px; text-align: center; }
        .o-h3 { color: #0f172a; margin: 0 0 8px 0; font-size: 1.4rem; font-weight: 700; }
        .o-p { color: #64748b; margin: 0 0 25px 0; font-size: 1.05rem; font-weight: 500; }
        .o-grid { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .o-emoji { font-size: 1.8rem; display: block; margin-bottom: 8px; }
        .o-radio { margin-bottom: 12px; transform: scale(1.3); cursor: pointer; }
        .o-txt { font-size: 0.75rem; color: #1e293b; display: block; line-height: 1.2; }
        
        /* Selección inteligente mediante CSS puro */
        .o-label { flex: 1; text-align: center; cursor: pointer; padding: 12px 4px; border-radius: 12px; transition: all 0.2s; border: 1px solid transparent; }
        .o-label:hover { background: #f1f5f9; }
        .o-label:has(input:checked) { background: #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-color: #cbd5e1; }
    </style>

    <script>

        /* =========================================================
            CONFIGURACIÓN GENERAL
        ========================================================= */
        const jsPsych = initJsPsych({
            extensions: [
                {
                    type: jsPsychExtensionWebgazer,
                    params: {
                        auto_initialize: false,
                        round_predictions: true,
                        sampling_interval: 34
                    }
                }
            ]
        });

        let animationId = null;
        let audioContext = null;
        let intentos_calibracion = 0;

        //Seguro anti-cierre de pestaña
        let experimentoTerminado = false;

        window.addEventListener('beforeunload', function (e) {
            if (!experimentoTerminado) e.preventDefault();
        });
        
        if (!run_id) {
            console.warn("ALERTA: No se detectó ningún 'run-id' en la URL. Las llamadas a la API van a fallar.");
            
            // Aviso si no se abre en Data Pruebas (poco probable)
            document.body.innerHTML = `
                <div style="text-align: center; margin-top: 100px; font-family: sans-serif; padding: 20px;">
                    <h2 style="color: #cc0000;">Error de inicialización</h2>
                    <p style="font-size: 1.1rem; color: #333;">El experimento no se inició a través de la plataforma Datapruebas (en este caso mi servidor).</p>
                    <p style="color: #666;">Por favor, vuelve a ingresar desde el panel de paciente de la plataforma.</p>
                </div>
            `;
            throw new Error("Ejecución detenida: Falta run-id en la URL.");

        }
       

        /* =========================================================
            UTILIDADES
        ========================================================= */
        /**
         * Crea un trial de jsPsych que muestra una imagen de estímulo.
         * Controla que la grabación y el timer inicien SOLO cuando la imagen está visible.
         */
         function crearTrialImagen(src, nombreArchivo = null, tiempo) {
            let rectImagen = null;

            return {
                type: jsPsychHtmlButtonResponse,
                extensions: [
                    {
                        type: jsPsychExtensionWebgazer,
                        params: {
                            targets: ['#estimulo-imagen']
                        }
                    }
                ],

                stimulus: /*html*/ `
                    <div class="wrapper-experimento">
                        <div class="card-experimento">
                            <div style="margin-bottom: 25px;">
                                <span id="timer-display" class="timer-pill">
                                    Tiempo restante: ${tiempo}s
                                </span>
                            </div>
                            
                            <h2 class="title">Descripción de Escena Visual</h2>
                            <p style="color: #64748b; margin-bottom: 25px; font-weight: 500;">Por favor, describí detalladamente todo lo que observes en la imagen. Hace de cuenta que se la estas describiendo a alguien que no puede verla.</p>

                            <div class="stimulus-container">
                                <img id="estimulo-imagen" src="${src}" class="stimulus-image">
                                <div id="loader-imagen-local" class="loader-text">⏳ Cargando estímulo visual...</div>
                            </div>

                            <div>
                                 <button type="button" id="btn-enviar-custom" disabled>Enviar descripción</button>
                            </div>
                        </div>
                    </div>`,
                choices: [],
                on_load: () => { 
                    const img = document.getElementById('estimulo-imagen');
                    const loader = document.getElementById('loader-imagen-local');
                    const timerDisplay = document.getElementById('timer-display');
                    const btnEnviar = document.getElementById('btn-enviar-custom');

                    function dispararTrial() {
                        console.log(`[Estímulo Imagen] Presentando: ${nombreArchivo}. Iniciando grabación...`);
                        
                        if (loader) loader.remove();
                        img.style.opacity = '1';
                        
                        if (timerDisplay) timerDisplay.style.visibility = 'visible';
                        if (btnEnviar) {
                            btnEnviar.disabled = false;
                            btnEnviar.style.opacity = '1';
                            btnEnviar.style.cursor = 'pointer';
                        }

                        requestAnimationFrame(() => {
                            rectImagen = img.getBoundingClientRect();  // ← NUEVO: capturar rect
                            console.log(`[Rect] ${nombreArchivo}:`, rectImagen);
                            comenzarGrabacion();
                            iniciarTimerVisual(tiempo, nombreArchivo);
                        });
                    }

                    if (img.complete && img.naturalWidth !== 0) {
                        dispararTrial();
                    } else {
                        img.onload = function() {
                            dispararTrial();
                        };
                    }

                    btnEnviar.addEventListener('click', function(e) {
                        e.preventDefault();
                        this.disabled = true;
                        this.textContent = "Enviando...";
                        frenarYEnviarServidor(nombreArchivo);
                    });
                },
                
                on_finish: function(data) {
                    const img = document.getElementById('estimulo-imagen');
                    const rect = img ? img.getBoundingClientRect() : null;

                    recordData({
                        trial: nombreArchivo,
                        webgazer_data: data.webgazer_data,
                        imagen_rect: rectImagen ? { 
                            x: rectImagen.x,
                            y: rectImagen.y,
                            width: rectImagen.width,
                            height: rectImagen.height
                        } : null
                    }).catch(error => {
                        console.error("Error guardando eye tracking:", error);
                    });  
                }
            }
        }

        /**
         * Crea un trial de jsPsych estático para mostrar pantallas de instrucciones o textos informativos.
         * Con diseño unificado de tarjeta de alta consultoría.
         * @param {string} titulo - El título principal
         * @param {string[]} parrafos - Un arreglo de strings, donde cada elemento es un párrafo o instrucción.
         * @param {string} [boton='Entendido, continuar'] - Texto del botón
         * @returns {Object} Devuelve el objeto de configuración del trial para el timeline de jsPsych.
         */
        function crearInstrucciones(titulo, parrafos, boton = 'Entendido, continuar') {
            const items = parrafos.map(p => `
                <li style="position: relative; padding-left: 35px; margin-bottom: 16px; font-size: 1.1rem; color: #475569; line-height: 1.6; text-align: left; list-style: none;">
                    <span style="position: absolute; left: 0; top: 2px; color: #2563eb; font-weight: bold; font-size: 1.2rem;">✓</span>
                    ${p}
                </li>
            `).join('');

            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: /*html*/ `
                    <div class="wrapper-experimento">
                        <div class="card-experimento">
                            <span class="eyebrow">Información Importante</span>
                            <h2 class="title">${titulo}</h2>
                            <div class="section-box">
                                <ul style="margin: 0; padding: 0;">${items}</ul>
                            </div>
                        </div>
                    </div>`,
                choices: [boton],
            };
        }

        /**
         * Crea un trial unificado de evaluación emocional (Valencia y Arousal) utilizando emojis modernos.
         * @param {string} [fase='evaluacion_sam'] - Etiqueta para identificar la fase en la base de datos.
         * @returns {Object} Configuración del trial para el timeline de jsPsych.
         */
        function crearTrialEvaluacionEmocional(fase = 'evaluacion_sam') {
            const val_opciones = [
                ["🤬", "Muy malo /", "negativo"], ["😟", "Bastante", "malo"], ["🙁", "Un poco", "malo"],
                ["😐", "Neutro", ""], ["🙂", "Un poco", "bueno"], ["😀", "Bastante", "bueno"], ["🚀", "Muy bueno /", "positivo"]
            ];
            
            const aro_opciones = [
                ["😴", "Muy bajo", "(Calmo)"], ["🥱", "Bastante", "bajo"], ["☕", "Un poco", "bajo"],
                ["🧘", "Ni bajo", "ni alto"], ["👀", "Un poco", "alto"], ["🔥", "Bastante", "alto"], ["💥", "Muy alto", "(Activado)"]
            ];

            const genColumnas = (name, opciones) => opciones.map((opt, i) => `
                <label class="o-label">
                    <span class="o-emoji">${opt[0]}</span>
                    <input type="radio" name="${name}" value="${i+1}" class="o-radio"><br>
                    <span class="o-txt" style="font-weight: ${i===0||i===3||i===6 ? '700':'500'};">
                        ${opt[1]}${opt[2] ? '<br>'+opt[2] : ''}
                    </span>
                </label>`).join('');
            
            let valorValencia = null;
            let valorArousal = null;

            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: /*html*/ `
                    <div class="o-con">
                        <h2 class="o-title">Evaluación Emocional</h2>
                        <form id="oasis-form">
                            <div class="o-card">
                                <h3 class="o-h3">VALENCIA</h3>
                                <p class="o-p">¿Cómo describirías tu estado de ánimo en este preciso momento?</p>
                                <div class="o-grid">${genColumnas('oasis_valence', val_opciones)}</div>
                            </div>
                            <div class="o-card" style="margin-bottom: 35px;">
                                <h3 class="o-h3">ACTIVACIÓN</h3>
                                <p class="o-p">¿Cómo sentís tu nivel de energía o activación corporal en este preciso momento?</p>
                                <div class="o-grid">${genColumnas('oasis_arousal', aro_opciones)}</div>
                            </div>
                        </form>
                    </div>`,

                choices: ['Guardar y continuar'], 
                on_load: function() {
                    const btnEnviar = document.querySelector('.jspsych-btn');
                    if (btnEnviar) btnEnviar.disabled = true;

                    // Captura global de cambios en los radios.
                    document.getElementById('oasis-form').addEventListener('change', () => {
                        const v_checked = document.querySelector('input[name="oasis_valence"]:checked');
                        const a_checked = document.querySelector('input[name="oasis_arousal"]:checked');

                        if (v_checked) valorValencia = parseInt(v_checked.value);
                        if (a_checked) valorArousal = parseInt(a_checked.value);

                        if (btnEnviar) btnEnviar.disabled = !(v_checked && a_checked);
                    });
                },
                on_finish: async function (data) {
                    data.oasis_valence = valorValencia;
                    data.oasis_arousal = valorArousal;
                    data.fase = fase;

                    console.log(" Guardando datos Oasis");

                    try {
                    await recordData({
                        trial: fase,
                        oasis_valence: data.oasis_valence,
                        oasis_arousal: data.oasis_arousal
                    });
                    console.log(" Oasis guardado con éxito en el servidor.")
                    
                    } catch (error) {
                        console.error("Error al guardar Oasis, pero avanzamos igual:", error);
                    }
                }
            };
        }

        /* =========================================================
            INSTRUCCIONES
        ========================================================= */
        const instrucciones_1 = crearInstrucciones(
            'Instrucciones',
            [
                'Para este experimento te vamos a mostrar 3 imagenes distintas.',
                'Para cada una te pedimos que describas todo lo que está pasando en 1 minuto como si se la estuvieses describiendo a alguien que no puede verla.',
                'Cuando termines, presioná <b>Enviar</b> para guardar tus resultados y pasar a la siguiente imagen.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente imagen.'
            ]
        );

        const instrucciones_medio = crearInstrucciones(
            'Instrucciones',
            [
                'Tomate el tiempo que necesites antes de avanzar a la siguiente imagen',
                'Cuando estes listo, presiona siguiente y como con la imagen anterior tenes 1 minuto para describir todo lo que está pasando, como si se la explicaras a alguien que no puede verla.'
            ],
            'Siguiente'
        );

        const instrucciones_sam = crearInstrucciones(
            'Instrucciones',
            [
                'Por ultimo te pedimos que completes un pequeño formulario sobre tus emociones',
            ],
            'Siguiente'
        );

        const instrucciones_recalibracion = crearInstrucciones(
            'Recalibración de Seguimiento Ocular',
            [
                'Antes de continuar vamos a realizar una breve recalibración del seguimiento ocular.',
                'Seguí los puntos con la mirada como lo hiciste al principio.'
            ],
            'Comenzar recalibración'
        );


        /* =========================================================
            PANTALLAS GENERALES
        ========================================================= */
        const bienvenida = {
            type: jsPsychHtmlButtonResponse,
            stimulus: /*html*/ `
                <div class="wrapper-experimento">
                    <div class="card-experimento">
                        <span class="eyebrow">Inicio del Experimento</span>
                        <h2 class="title">¡Te damos la bienvenida al experimento!</h2>
                        <h3 class="subtitle">Este experimento consiste de 3 partes. Para evitar distracciones te pedimos que:</h3>

                        <div class="section-box">
                            <ul class="checklist">
                                <li> Cierres otras pestañas y aplicaciones que generen notificaciones. </li>
                                <li>Pongas el teléfono en modo <b>"No molestar" o silencio</b>.</li>
                                <li> Minimices distracciones de tu entorno, intentando estar en un <b>lugar tranquilo</b>.</li>
                                <li> Te asegures de tener <b>buena iluminacion</b>, de manera que <b>tu cara se vea claramente</b> cuando realices la calibracion mas adelante. </li>
                            </ul>
                        </div>
                    </div>
                </div>`,
            choices: ['Siguiente'],
        };

        const pantalla = {
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            message: '<h3>El experimento ira a pantalla completa cuando presiones el boton que se encuentra abajo</h3>',
            button_label: 'Ir a pantalla completa'
        }
        
        const calibracion_mic = {
            type: jsPsychHtmlButtonResponse,
            stimulus: /*html*/ `
            <div class="wrapper-experimento">
                <div class="card-experimento">
                    <span class="eyebrow">Paso Previo Requerido</span>
                    <h2 class="title">Verificación de Micrófono</h2>
                    <p style="color: #64748b; margin-bottom: 35px;">Asegurémonos de que tu micrófono funcione correctamente antes de empezar.</p>

                    <div class="section-box">
                        <h3 class="subtitle">🎙️ Verificación de micrófono</h3>
                        <p style="margin-bottom: 15px; font-size: 0.95rem; color: #475569;">Hablá en voz alta frente a tu dispositivo y fijate que la barra se mueva. Si no se mueve, intenta hablar un poco más fuerte.</p>
                        <div style="background: #e2e8f0; border-radius: 9999px; height: 16px; overflow: hidden; border: 1px solid #cbd5e1;">
                            <div id="barra-audio" style="height: 100%; width: 0%; background: #22c55e; transition: width 0.1s;"></div>
                        </div>
                    </div>

                    <p id="estado-mic-cam" style="color: #64748b; font-weight: 600; margin-bottom: 25px;">⏳ Iniciando micrófono...</p>
                    
                    <div>
                        <button id="btn-calibracion" class="jspsych-btn" disabled>
                            Calibración de audio lista
                        </button>
                    </div>
                </div>
            </div>`,
            choices: [],

            on_load: function () {
                const constraints = {
                    audio: true,
                    video: true
                };

                navigator.mediaDevices.getUserMedia(constraints)
                    .then(function (stream) {
                        document.getElementById('estado-mic-cam').textContent = 'Micrófono activo.';
                        document.getElementById('estado-mic-cam').style.color = 'green';
                        document
                            .getElementById('btn-calibracion')
                            .addEventListener('click', function () {
                                jsPsych.finishTrial();
                            });

                        const audioContext = new AudioContext();
                        const source = audioContext.createMediaStreamSource(stream);
                        const analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        source.connect(analyser);

                        const dataArray = new Uint8Array(analyser.frequencyBinCount);

                        // Calibracion del audio
                        let volumenSuave = 0;
                        function updateBar() {
                            const barra = document.getElementById('barra-audio');
                            if (!barra) return;
                           
                            analyser.getByteTimeDomainData(dataArray);
                        
                            let sumSquaredDifferences = 0;
                            for (let i = 0; i < dataArray.length; i++) {
                                const dev = dataArray[i] - 128;
                                sumSquaredDifferences += dev * dev;
                            }
                            
                            const meanSquare = sumSquaredDifferences / dataArray.length;
                            const rms = Math.sqrt(meanSquare);

                            const porcentajeInstantaneo = Math.max(0, Math.min(rms * 2.8, 100));
                            const factorSuavizado = 0.15;
                            volumenSuave = (volumenSuave * (1 - factorSuavizado)) + (porcentajeInstantaneo * factorSuavizado);

                            barra.style.width = volumenSuave + '%';

                            //Habilitar boton si el promedio se mueve bien con la voz
                            if (volumenSuave > 25) {
                                document.getElementById('btn-calibracion').disabled = false;
                            }

                            requestAnimationFrame(updateBar);
                        }
                        updateBar();
                        inicializarGrabador(stream);
                    })
                    .catch(function () {
                        document.getElementById('estado-mic-cam').textContent = 
                            'No se pudo acceder al micrófono. Revisá los permisos.';
                        document.getElementById('estado-mic-cam').style.color = 'red';
                    });
            }
        }

        // Pagina final de cierre y guardado
        const pantalla_final = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <div class="wrapper-experimento">
                    <div class="card-experimento">
                        <h2 class="title">¡Muchas gracias por participar!</h2>
                        <p style="color: #475569; font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px;">
                            Hemos finalizado todas las tareas del experimento. Ya podés cerrar esta pestaña de forma segura.
                        </p>
                        <div class="section-box" style="background: #f0fdf4; border-color: #bbf7d0;">
                            <p style="color: #166534; font-weight: 600; margin: 0;"> 
                                Si te gustó este experimento y querés ayudarnos con tu participación en otro, te invitamos a hacer el de <b>"Memoria Autobiográfica"</b>. 
                            </p>
                        </div>
                    </div>
                </div>
            `,
            choices: [],
            on_load: function() {
                console.log("[Final] Verificando si quedan videos viajando en la fila...");
                
                mostrarPantallaCarga();

                esperarQueTermineLaCola().then(() => {
                    console.log("[Final] ¡La fila de videos se vació por completo! Todo a salvo en el servidor.");
                    ocultarPantallaCarga(); 
                    
                    if (typeof finishExperiment === 'function') {
                        finishExperiment(); 
                    }
                })
                .catch(error => {
                    console.error("[Final] Error:", error);
                    ocultarPantallaCarga();
                });
            },
        };


        /* =========================================================
            EYE TRACKING
        ========================================================= */
        const iniciar_webgazer = {
            type: jsPsychWebgazerInitCamera,
            instructions: /*html*/ `
                <div class="wrapper-experimento">
                    <div class="card-experimento">

                        <span class="eyebrow">
                            Paso previo Requerido
                        </span>

                        <h2 class="title">Configuracion de Seguimiento Ocular</h2>
                        
                        <h3 class="subtitle">Para que el seguimiento ocular sea exitoso te pedimos que: </h3>

                        <div class="section-box">
                            <ul class="checklist">
                                <li> Mantengas tu rostro visible frente a la pantalla. </li>
                                <li> Minimices movimientos bruscos durante la tarea. </li>
                                <li> Durante la calibracion sigas los puntos de que van a aparecer en la pantalla con la mirada </li>
                                <li> Mantengas la mirada en cada punto hasta que desaparezca. No intentes predecir la ubicacion del siguiente punto. </li>
                            </ul>
                        </div>
                    </div>
                </div>`
        };

        const calibracion = {
            type: jsPsychWebgazerCalibrate,
            calibration_points: [
                [25, 25], [50, 25], [75, 25],
                [25, 50], [50, 50], [75, 50],
                [25, 75], [50, 75], [75, 75]
            ],
            repetitions_per_point: 2,
            randomize_calibration_order: true,
            calibration_mode: "view",
            time_per_point: 1000
        };
        
        const validacion = {
            type: jsPsychWebgazerValidate,
            validation_points: [
                [25, 25], [50, 25], [75, 25],
                [25, 50], [50, 50], [75, 50],
                [25, 75], [50, 75], [75, 75]
            ],
            roi_radius: 200,
            time_to_saccade: 1000,
            validation_duration: 2000,

            on_finish: function(data) {

            // calcular promedio
            const promedio =
                data.percent_in_roi.reduce((a,b) => a+b, 0) /
                data.percent_in_roi.length;

                // guardar en jsPsych
                data.intento_calibracion = intentos_calibracion + 1;
                data.validacion_promedio = promedio;
                data.calibracion_aprobada = promedio >= 70;
            }       
        };

        const mensaje_recalibracion = {
            timeline: [{
                type: jsPsychHtmlButtonResponse,
                stimulus: `
                    <h2>Recalibracion</h2>
                    <p>Para optimizar el seguimiento ocular vamos a repetir el proceso de calibracion.</p>
                `,
                choices: ["Continue"]
            }],

            conditional_function: function() {

                const ultima = jsPsych.data
                    .get()
                    .filter({ trial_type: "webgazer-validate" })
                    .last(1)
                    .values()[0];

                return (
                !ultima.calibracion_aprobada &&
                intentos_calibracion === 0
                );
            }
        };

        const bloque_calibracion = {
            timeline: [
                calibracion,
                validacion,
                mensaje_recalibracion
            ],

            loop_function: function() {

                const ultima = jsPsych.data
                    .get()
                    .filter({ trial_type: "webgazer-validate" })
                    .last(1)
                    .values()[0];

                console.log(
                    `Intento ${ultima.intento_calibracion}: ${ultima.validacion_promedio.toFixed(1)}%`
                );

                const repetir =
                    !ultima.calibracion_aprobada &&
                    intentos_calibracion < 1;

                intentos_calibracion++;

                return repetir;
            }
        };

        const guardar_validacion = {
            type: jsPsychCallFunction,
            async: true,

            func: async function(done) {
                const validaciones = jsPsych.data
                    .get()
                    .filter({ trial_type: "webgazer-validate" })
                    .values();
                const ultima = validaciones[validaciones.length - 1];
                try {
                    await recordData({
                        trial: "webgazer_validation",
                        intentos_calibracion: validaciones.length,
                        validacion_promedio: ultima.validacion_promedio,
                        calibracion_aprobada: ultima.calibracion_aprobada
                    });
                    console.log(" Validación guardada en el servidor");
                } catch(error) {
                    console.error(
                        "Error guardando validación:",
                        error
                    );
                }
                done();
            }
        };

        const recalibracion_cookie = {
            timeline: [
                instrucciones_recalibracion,
                calibracion,
                validacion
            ]
        };


       /* =========================================================
            COOKIE JAR
        ========================================================= */
        const lamina_nueva_original = crearTrialImagen('cookie_nueva_original.png', 'lamina_nueva_original', 60);
        const lamina_nueva_invertida = crearTrialImagen('cookie_nueva_invertida.png', 'lamina_nueva_invertida', 60)
        const lamina_vieja_original = crearTrialImagen('cookie_vieja_original.png', 'lamina_vieja_original', 60);
        const lamina_vieja_invertida = crearTrialImagen('cookie_vieja_invertida.png', 'lamina_vieja_invertida', 60)
        
        // Aleatorización de las dos variantes de CookieJar (Original vs Nueva)
        const bloque_laminas_nuevas_aleatorio = jsPsych.randomization.shuffle([lamina_nueva_original, lamina_nueva_invertida]);
        const bloque_laminas_viejas_aleatorio = jsPsych.randomization.shuffle([lamina_vieja_original, lamina_vieja_invertida]);
        const bloque_laminas_cookie_aleatorio = jsPsych.randomization.shuffle([bloque_laminas_nuevas_aleatorio[0], bloque_laminas_viejas_aleatorio[0]]);


       /* =========================================================
            OASIS
        ========================================================= */
        const lamina_oasis_1 = crearTrialImagen('oasis_1.jpg', 'oasis_1', 60);
        const lamina_oasis_2 = crearTrialImagen('oasis_2.jpg', 'oasis_2', 60);
        const lamina_oasis_3 = crearTrialImagen('oasis_3.jpg', 'oasis_3', 60);
        const lamina_oasis_4 = crearTrialImagen('oasis_4.jpg', 'oasis_4', 60);
        
        // Aleatorización de las imagenes de Oasis
        const bloque_laminas_oasis_aleatorio = jsPsych.randomization.shuffle([lamina_oasis_1, lamina_oasis_2, lamina_oasis_3, lamina_oasis_4]);
        
        const evaluacion_sam_unificada = crearTrialEvaluacionEmocional('evaluacion_sam');


        /* =========================================================
            TIMELINE FINAL
        ========================================================= */
        jsPsych.run([
            bienvenida,
            pantalla,
            calibracion_mic,
            iniciar_webgazer,
            bloque_calibracion,
            guardar_validacion,
            instrucciones_1,
            bloque_laminas_cookie_aleatorio[0],
            instrucciones_medio, 
            bloque_laminas_oasis_aleatorio[0],
            recalibracion_cookie,
            guardar_validacion,
            instrucciones_medio,
            bloque_laminas_cookie_aleatorio[1],
            instrucciones_sam,
            evaluacion_sam_unificada,
            pantalla_final
        ]);
    </script>
</body>

</html>
